<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- ID Card background -->
  <rect x="4" y="6" width="40" height="36" rx="5" fill="#f0f4ff" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Blue header strip -->
  <rect x="4" y="6" width="40" height="12" rx="5" fill="#3b82f6"/>
  <rect x="4" y="13" width="40" height="5" fill="#3b82f6"/>
  
  <!-- Profile photo circle -->
  <circle cx="18" cy="18" r="7" fill="#e0e7ff" stroke="white" stroke-width="2"/>
  <!-- Person in circle -->
  <circle cx="18" cy="16" r="3" fill="#6366f1"/>
  <path d="M12 24 C12 20 14 19 18 19 C22 19 24 20 24 24" fill="#6366f1"/>
  
  <!-- Name line -->
  <rect x="28" y="14" width="13" height="2.5" rx="1" fill="white" opacity="0.9"/>
  
  <!-- Info lines on card -->
  <rect x="10" y="28" width="18" height="2" rx="1" fill="#334155" opacity="0.6"/>
  <rect x="10" y="33" width="14" height="2" rx="1" fill="#334155" opacity="0.4"/>
  <rect x="10" y="38" width="16" height="2" rx="1" fill="#334155" opacity="0.3"/>
  
  <!-- Info "i" badge -->
  <circle cx="34" cy="34" r="5" fill="#3b82f6"/>
  <text x="34" y="37.5" font-size="8" fill="white" font-family="Georgia, serif" text-anchor="middle" font-weight="bold" font-style="italic">i</text>
</svg>
