  <rect x="20" y="22" width="6" height="20" rx="1" fill="#6366f1" opacity="0.8"/>
  <rect x="28" y="28" width="8" height="8" rx="1" fill="#8b5cf6" opacity="0.9"/>
  <!-- Decoder (Upsampling) -->
  <rect x="38" y="22" width="6" height="20" rx="1" fill="#6366f1" opacity="0.8"/>
  <rect x="46" y="16" width="6" height="32" rx="1" fill="#3b82f6" opacity="0.8"/>
  
  <!-- Skip Connections -->
