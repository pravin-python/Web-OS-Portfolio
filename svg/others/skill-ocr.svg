<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Document background -->
  <rect x="16" y="8" width="32" height="48" rx="4" fill="#1e293b" stroke="#818cf8" stroke-width="3"/>
  <!-- Text lines -->
  <line x1="24" y1="20" x2="40" y2="20" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="28" x2="36" y2="28" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="40" y2="36" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <!-- Scanner line -->
  <line x1="12" y1="44" x2="52" y2="44" stroke="#10b981" stroke-width="2" stroke-linecap="round">
    <animate attributeName="y1" values="12;50;12" dur="3s" repeatCount="indefinite" />
    <animate attributeName="y2" values="12;50;12" dur="3s" repeatCount="indefinite" />
  </line>
  <!-- OCR Text overlay -->
  <text x="32" y="52" fill="#6ee7b7" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">OCR</text>
</svg>
