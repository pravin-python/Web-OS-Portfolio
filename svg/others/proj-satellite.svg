<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Space/Earth background -->
  <circle cx="32" cy="48" r="24" fill="#1e3a8a"/>
  <!-- Topography lines -->
  <path d="M12 40 Q 32 30 52 40" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <path d="M8 50 Q 32 40 56 50" fill="none" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Satellite -->
  <rect x="28" y="10" width="8" height="8" fill="#94a3b8"/>
  <rect x="18" y="12" width="8" height="4" fill="#3b82f6"/>
  <rect x="38" y="12" width="8" height="4" fill="#3b82f6"/>
  <line x1="26" y1="14" x2="28" y2="14" stroke="#475569" stroke-width="1"/>
  <line x1="36" y1="14" x2="38" y2="14" stroke="#475569" stroke-width="1"/>
  
  <!-- Segmentation Grid Scanner overlay on Earth -->
  <path d="M26 18 L16 38 L48 38 L38 18" fill="#10b981" opacity="0.2"/>
  <line x1="21" y1="28" x2="43" y2="28" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="18" x2="32" y2="38" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  
  <!-- Clouds and Shadows detected -->
  <path d="M20 44 Q 24 40 28 44" fill="#ffffff" opacity="0.8"/>
  <rect x="20" y="44" width="8" height="6" fill="none" stroke="#f43f5e" stroke-width="1"/> <!-- Cloud bounding Box -->

  <path d="M40 48 Q 44 46 48 48" fill="#0f172a" opacity="0.6"/> <!-- Shadow -->
  <rect x="40" y="46" width="8" height="4" fill="none" stroke="#facc15" stroke-width="1"/> <!-- Shadow bounding box -->
</svg>
