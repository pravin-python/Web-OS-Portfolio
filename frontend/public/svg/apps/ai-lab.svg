<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dark lab background -->
  <rect x="2" y="2" width="44" height="44" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Neural network visualization -->
  <!-- Input layer -->
  <circle cx="10" cy="12" r="3" fill="#3b82f6"/>
  <circle cx="10" cy="24" r="3" fill="#3b82f6"/>
  <circle cx="10" cy="36" r="3" fill="#3b82f6"/>
  
  <!-- Hidden layer 1 -->
  <circle cx="24" cy="10" r="3" fill="#8b5cf6"/>
  <circle cx="24" cy="20" r="3" fill="#8b5cf6"/>
  <circle cx="24" cy="30" r="3" fill="#8b5cf6"/>
  <circle cx="24" cy="40" r="3" fill="#8b5cf6"/>
  
  <!-- Output layer -->
  <circle cx="38" cy="18" r="3.5" fill="#22c55e"/>
  <circle cx="38" cy="32" r="3.5" fill="#22c55e"/>
  
  <!-- Connections: input → hidden -->
  <line x1="13" y1="12" x2="21" y2="10" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="13" y1="12" x2="21" y2="20" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <line x1="13" y1="12" x2="21" y2="30" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  <line x1="13" y1="24" x2="21" y2="10" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  <line x1="13" y1="24" x2="21" y2="20" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="13" y1="24" x2="21" y2="30" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <line x1="13" y1="24" x2="21" y2="40" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  <line x1="13" y1="36" x2="21" y2="20" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  <line x1="13" y1="36" x2="21" y2="30" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="13" y1="36" x2="21" y2="40" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Connections: hidden → output -->
  <line x1="27" y1="10" x2="35" y2="18" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="27" y1="10" x2="35" y2="32" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
  <line x1="27" y1="20" x2="35" y2="18" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="27" y1="20" x2="35" y2="32" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4"/>
  <line x1="27" y1="30" x2="35" y2="18" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
  <line x1="27" y1="30" x2="35" y2="32" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="27" y1="40" x2="35" y2="32" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Pulse glow on active nodes -->
  <circle cx="10" cy="24" r="5" fill="#3b82f6" opacity="0.15"/>
  <circle cx="24" cy="20" r="5" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="38" cy="18" r="5.5" fill="#22c55e" opacity="0.15"/>
  
  <!-- Node inner highlights -->
  <circle cx="9" cy="11" r="1" fill="white" opacity="0.3"/>
  <circle cx="9" cy="23" r="1" fill="white" opacity="0.3"/>
  <circle cx="9" cy="35" r="1" fill="white" opacity="0.3"/>
  <circle cx="23" cy="9" r="1" fill="white" opacity="0.25"/>
  <circle cx="23" cy="19" r="1" fill="white" opacity="0.25"/>
  <circle cx="37" cy="17" r="1" fill="white" opacity="0.3"/>
</svg>
