name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov

    - name: Create .env.test
      run: |
        echo "DJANGO_SECRET_KEY=test-secret-key-12345" > Portfolio-OS/.env.test
        echo "DEBUG=True" >> Portfolio-OS/.env.test
        echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> Portfolio-OS/.env.test

    - name: Check for missing migrations
      working-directory: ./Portfolio-OS
      run: python manage.py makemigrations --check

    - name: Run migrations
      working-directory: ./Portfolio-OS
      run: python manage.py migrate

    - name: Run Django system checks
      working-directory: ./Portfolio-OS
      run: python manage.py check

    - name: Run unit tests with pytest
      working-directory: ./Portfolio-OS
      run: pytest --cov=. --cov-report=xml --junitxml=pytest.xml

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v6
      with:
        name: backend-coverage
        path: Portfolio-OS/coverage.xml

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: always() # always run even if the previous step fails
      with:
        report_paths: '**/pytest.xml'
        check_name: "Backend Test Results"
