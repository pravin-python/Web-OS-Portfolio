  <circle cx="30" cy="42" r="2" fill="#3b82f6"/>
  <circle cx="40" cy="28" r="2" fill="#3b82f6"/>

  <!-- AI Prediction Path -->
  <path d="M40 28 Q 48 18 54 14" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3 3"/>
