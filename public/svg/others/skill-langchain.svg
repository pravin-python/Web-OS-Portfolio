<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Chain Links representing LangChain -->
  
  <!-- Link 1 (Top Left) -->
  <rect x="12" y="16" width="20" height="12" rx="6" fill="none" stroke="#3b82f6" stroke-width="4" transform="rotate(45 22 22)"/>
  
  <!-- Link 2 (Center - AI Node) -->
  <rect x="24" y="26" width="16" height="12" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="4"/>
  <circle cx="32" cy="32" r="2" fill="#6ee7b7"/>
  
  <!-- Link 3 (Bottom Right) -->
  <rect x="32" y="36" width="20" height="12" rx="6" fill="none" stroke="#8b5cf6" stroke-width="4" transform="rotate(45 42 42)"/>
  
  <!-- Connecting sparkles / data points -->
  <circle cx="20" cy="20" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="44" cy="44" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="1s" repeatCount="indefinite" />
  </circle>
</svg>
