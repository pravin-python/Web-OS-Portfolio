<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Central Hub (The Router) -->
  <polygon points="32,16 46,32 32,48 18,32" fill="#1e293b" stroke="#ec4899" stroke-width="3"/>
  <circle cx="32" cy="32" r="4" fill="#fbcfe8"/>

  <!-- Routing Paths (APIs) -->
  <!-- Top left -->
  <path d="M22 26 L10 14" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="10" cy="14" r="3" fill="#60a5fa"/>
  
  <!-- Top right -->
  <path d="M42 26 L54 14" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <circle cx="54" cy="14" r="3" fill="#34d399"/>
  
  <!-- Bottom left -->
  <path d="M22 38 L10 50" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="10" cy="50" r="3" fill="#fbbf24"/>
  
  <!-- Bottom right -->
  <path d="M42 38 L54 50" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="54" cy="50" r="3" fill="#a78bfa"/>
  
  <!-- Data packets traveling -->
  <circle cx="16" cy="20" r="1.5" fill="#ffffff">
    <animate attributeName="cx" values="22;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="26;14" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="44" r="1.5" fill="#ffffff">
    <animate attributeName="cx" values="42;54" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="38;50" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
