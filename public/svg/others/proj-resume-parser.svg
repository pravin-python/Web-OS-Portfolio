<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Resume Document -->
  <rect x="20" y="8" width="24" height="32" rx="2" fill="#1e293b" stroke="#cbd5e1" stroke-width="2"/>
  <!-- User avatar on resume -->
  <circle cx="32" cy="16" r="3" fill="#64748b"/>
  <path d="M28 22 C 28 20, 36 20, 36 22 L 36 24 L 28 24 Z" fill="#64748b"/>
  <!-- Text lines (Resume content) -->
  <line x1="24" y1="28" x2="40" y2="28" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="36" y2="32" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="40" y2="36" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>

  <!-- AI Extraction / ATS Scoring elements -->
  <!-- Extracting Node -->
  <circle cx="48" cy="36" r="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="48" y="39" fill="#10b981" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">98</text>
  
  <path d="M38 32 L42 34" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="1 1"/>
  <path d="M40 36 L43 36" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="1 1"/>

  <!-- ATS Graph -->
  <rect x="14" y="46" width="36" height="12" rx="2" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="16" y="50" width="30" height="4" rx="2" fill="#334155"/>
  <rect x="16" y="50" width="26" height="4" rx="2" fill="#10b981">
    <animate attributeName="width" values="0;26" dur="2s" fill="freeze" />
  </rect>
</svg>
