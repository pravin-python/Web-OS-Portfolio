<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Drawing Board / Paper -->
  <rect x="12" y="14" width="40" height="36" rx="2" fill="#1e293b" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Handwritten Expression "E = mc²" -->
  <path d="M20 36 L20 24 L26 24 M20 30 L24 30 M20 36 L26 36" fill="none" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/> <!-- E -->
  <line x1="28" y1="28" x2="32" y2="28" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/> <!-- = -->
  <line x1="28" y1="32" x2="32" y2="32" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M34 36 L34 28 C 34 28, 36 28, 37 36 C 37 36, 39 28, 40 36" fill="none" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/> <!-- m -->
  <path d="M46 32 C 43 32, 43 36, 46 36" fill="none" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/> <!-- c -->
  <path d="M48 24 C 50 24, 50 26, 48 26 L 46 28 L 50 28" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/> <!-- ^2 -->

  <!-- CNN Bounding Box on letter 'E' -->
  <rect x="18" y="22" width="10" height="16" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="2 2"/>
  
  <!-- Neural Network overlay extracting meaning -->
  <path d="M23 22 L23 18 L32 10" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2 2"/>
  <path d="M48 22 L48 18 L32 10" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2 2"/>
  <circle cx="32" cy="10" r="3" fill="#3b82f6"/>
  <text x="32" y="12" fill="#ffffff" font-family="sans-serif" font-size="6" text-anchor="middle" font-weight="bold">∑</text>
</svg>
