<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Bounding box -->
  <rect x="16" y="16" width="32" height="32" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" rx="2">
    <animate attributeName="stroke-dashoffset" values="16;0" dur="2s" repeatCount="indefinite" />
  </rect>
  <!-- Central eye -->
  <path d="M12 32 C 12 32, 22 20, 32 20 C 42 20, 52 32, 52 32 C 52 32, 42 44, 32 44 C 22 44, 12 32, 12 32 Z" fill="#1e293b" stroke="#818cf8" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="32" cy="32" r="6" fill="#60a5fa" />
  <circle cx="32" cy="32" r="2" fill="#ffffff" />
  <!-- Corner nodes for object detection -->
  <rect x="14" y="14" width="4" height="4" fill="#f43f5e" />
  <rect x="46" y="14" width="4" height="4" fill="#f43f5e" />
  <rect x="14" y="46" width="4" height="4" fill="#f43f5e" />
  <rect x="46" y="46" width="4" height="4" fill="#f43f5e" />
</svg>
