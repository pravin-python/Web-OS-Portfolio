<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dashboard screen -->
  <rect x="2" y="2" width="44" height="38" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Screen header bar -->
  <rect x="2" y="2" width="44" height="6" rx="4" fill="#1e293b"/>
  <rect x="2" y="5" width="44" height="3" fill="#1e293b"/>
  <circle cx="7" cy="5" r="1.2" fill="#ef4444"/>
  <circle cx="11" cy="5" r="1.2" fill="#fbbf24"/>
  <circle cx="15" cy="5" r="1.2" fill="#22c55e"/>
  
  <!-- Rising trend line -->
  <polyline points="8,32 14,28 18,30 24,20 30,16 36,10 42,6" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Area fill under trend -->
  <polygon points="8,32 14,28 18,30 24,20 30,16 36,10 42,6 42,36 8,36" fill="#22c55e" opacity="0.15"/>
  
  <!-- Prediction zone (dashed) -->
  <line x1="32" y1="14" x2="42" y2="6" stroke="#22c55e" stroke-width="2" stroke-dasharray="3 2" opacity="0.5"/>
  
  <!-- Data points -->
  <circle cx="8" cy="32" r="2" fill="#3b82f6"/>
  <circle cx="14" cy="28" r="2" fill="#3b82f6"/>
  <circle cx="18" cy="30" r="2" fill="#3b82f6"/>
  <circle cx="24" cy="20" r="2" fill="#3b82f6"/>
  <circle cx="30" cy="16" r="2" fill="#8b5cf6"/>
  
  <!-- Predicted point (glowing) -->
  <circle cx="36" cy="10" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="36" cy="10" r="2" fill="#22c55e"/>
  
  <!-- Target crosshair on predicted -->
  <line x1="33" y1="10" x2="39" y2="10" stroke="#4ade80" stroke-width="0.8" opacity="0.7"/>
  <line x1="36" y1="7" x2="36" y2="13" stroke="#4ade80" stroke-width="0.8" opacity="0.7"/>
  
  <!-- Confidence bars bottom -->
  <rect x="8" y="34" width="6" height="2" rx="0.8" fill="#3b82f6" opacity="0.6"/>
  <rect x="16" y="34" width="10" height="2" rx="0.8" fill="#8b5cf6" opacity="0.6"/>
  <rect x="28" y="34" width="8" height="2" rx="0.8" fill="#22c55e" opacity="0.6"/>
  
  <!-- Laptop base -->
  <path d="M0 40 L4 40 L44 40 L48 40 L46 44 L2 44 Z" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="19" y="41" width="10" height="2" rx="0.8" fill="#475569"/>
</svg>
