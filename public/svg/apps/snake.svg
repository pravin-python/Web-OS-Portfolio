<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Game screen background -->
  <rect x="2" y="2" width="44" height="44" rx="5" fill="#0a0a1a" stroke="#1a1a3e" stroke-width="1.5"/>
  
  <!-- Subtle grid pattern -->
  <line x1="8" y1="2" x2="8" y2="46" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="14" y1="2" x2="14" y2="46" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="20" y1="2" x2="20" y2="46" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="26" y1="2" x2="26" y2="46" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="32" y1="2" x2="32" y2="46" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="38" y1="2" x2="38" y2="46" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="2" y1="8" x2="46" y2="8" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="2" y1="14" x2="46" y2="14" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="2" y1="20" x2="46" y2="20" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="2" y1="26" x2="46" y2="26" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="2" y1="32" x2="46" y2="32" stroke="#1a1a3e" stroke-width="0.3"/>
  <line x1="2" y1="38" x2="46" y2="38" stroke="#1a1a3e" stroke-width="0.3"/>

  <!-- Snake body segments (pixel-style) -->
  <!-- Tail -->
  <rect x="8" y="32" width="5.5" height="5.5" rx="1" fill="#15803d"/>
  <!-- Body -->
  <rect x="14" y="32" width="5.5" height="5.5" rx="1" fill="#16a34a"/>
  <rect x="20" y="32" width="5.5" height="5.5" rx="1" fill="#22c55e"/>
  <rect x="20" y="26" width="5.5" height="5.5" rx="1" fill="#22c55e"/>
  <rect x="20" y="20" width="5.5" height="5.5" rx="1" fill="#4ade80"/>
  <rect x="26" y="20" width="5.5" height="5.5" rx="1" fill="#4ade80"/>
  <rect x="32" y="20" width="5.5" height="5.5" rx="1" fill="#86efac"/>
  <rect x="32" y="14" width="5.5" height="5.5" rx="1" fill="#86efac"/>
  
  <!-- Snake head -->
  <rect x="32" y="8" width="6" height="6" rx="1.5" fill="#4ade80" stroke="#22c55e" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="34" cy="10" r="1.2" fill="white"/>
  <circle cx="34.3" cy="10" r="0.6" fill="#0a0a1a"/>
  <circle cx="37" cy="10" r="1.2" fill="white"/>
  <circle cx="37.3" cy="10" r="0.6" fill="#0a0a1a"/>
  
  <!-- Segment shine highlights -->
  <rect x="9" y="33" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="15" y="33" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="21" y="33" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="21" y="27" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="21" y="21" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="27" y="21" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="33" y="21" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>
  <rect x="33" y="15" width="2" height="1.5" rx="0.5" fill="white" opacity="0.15"/>

  <!-- Apple/food -->
  <rect x="8" y="8" width="5.5" height="5.5" rx="1.5" fill="#ef4444"/>
  <rect x="9" y="9" width="2" height="1.5" rx="0.5" fill="white" opacity="0.3"/>
  <!-- Apple leaf -->
  <path d="M11 8 C11.5 6 13 5.5 13 7" fill="#22c55e" stroke="none"/>

  <!-- Second food (bonus) -->
  <rect x="38" y="32" width="5.5" height="5.5" rx="1.5" fill="#f59e0b"/>
  <rect x="39" y="33" width="2" height="1.5" rx="0.5" fill="white" opacity="0.3"/>
  
  <!-- Glow effect around snake head -->
  <rect x="31" y="7" width="8" height="8" rx="2" fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.4"/>
</svg>
