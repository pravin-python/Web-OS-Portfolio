<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Board background -->
  <rect x="4" y="4" width="40" height="40" rx="4" fill="#1e293b" opacity="0.15"/>
  <!-- Grid lines -->
  <line x1="4" y1="17.3" x2="44" y2="17.3" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <line x1="4" y1="30.6" x2="44" y2="30.6" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <line x1="17.3" y1="4" x2="17.3" y2="44" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <line x1="30.6" y1="4" x2="30.6" y2="44" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <!-- X mark (top-left) -->
  <line x1="7.5" y1="7.5" x2="14" y2="14" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="14" y1="7.5" x2="7.5" y2="14" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
  <!-- O mark (center) -->
  <circle cx="24" cy="24" r="4.5" fill="none" stroke="#ef4444" stroke-width="2.8"/>
  <!-- X mark (bottom-right) -->
  <line x1="34" y1="34" x2="40.5" y2="40.5" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="40.5" y1="34" x2="34" y2="40.5" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
  <!-- O mark (top-right) -->
  <circle cx="37" cy="10.6" r="4.5" fill="none" stroke="#ef4444" stroke-width="2.8"/>
  <!-- X mark (center-left) -->
  <line x1="7.5" y1="21" x2="14" y2="27.5" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="14" y1="21" x2="7.5" y2="27.5" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
</svg>
