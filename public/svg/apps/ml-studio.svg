<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf5af2" />
      <stop offset="100%" stop-color="#5e5ce6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- AI Brain / Nodes -->
  <circle cx="20" cy="24" r="3" fill="#ffffff" />
  <circle cx="20" cy="40" r="3" fill="#ffffff" />
  <circle cx="32" cy="32" r="3" fill="#ffffff" />
  <circle cx="44" cy="24" r="3" fill="#ffffff" />
  <circle cx="44" cy="40" r="3" fill="#ffffff" />

  <!-- Connections -->
  <path d="M 22 25 L 30 31" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 22 39 L 30 33" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <path d="M 34 31 L 42 25" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 34 33 L 42 39" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <path d="M 20 27 L 20 37" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.6"/>
  <path d="M 44 27 L 44 37" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.6"/>
</svg>
