<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Envelope body -->
  <rect x="3" y="10" width="42" height="28" rx="4" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Envelope flap (triangle) -->
  <path d="M3 14 L24 30 L45 14" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Bottom fold -->
  <path d="M3 38 L20 25" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>
  <path d="M45 38 L28 25" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>
  <!-- Envelope top highlight -->
  <path d="M5 12 L24 27 L43 12" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.4"/>
  <!-- Notification badge -->
  <circle cx="40" cy="12" r="6" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
  <text x="40" y="15" font-size="8" fill="white" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">1</text>
</svg>
